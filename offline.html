<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f0c29">
    <title>لا يوجد اتصال بالإنترنت | عبد العزيز المحافيظ</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --clr-bg: #0f0c29;       
            --clr-light-blue: #00f2fe;
            --clr-pink: #ff0844;     
            --clr-purple: #8e2de2;   
            --clr-gold: #ffd700;     
            --clr-text: #f0f0f0;     
            --clr-glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--clr-bg);
            color: var(--clr-text);  
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            direction: rtl;
        }

        /* Dynamic Background from Website */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background:
                radial-gradient(circle at 15% 50%, rgba(142, 45, 226, 0.25), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(255, 8, 68, 0.25), transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(0, 242, 254, 0.2), transparent 50%);
            z-index: -1;
        }

        .offline-container {
            background: var(--clr-glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 3rem 2rem;
            border-radius: 20px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-wrapper {
            width: 160px;
            height: 160px;
            margin: 0 auto 25px;
            position: relative;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--clr-purple), var(--clr-pink));
            padding: 5px;
            box-shadow: 0 10px 25px rgba(255, 8, 68, 0.4);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            background-color: var(--clr-bg);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: var(--clr-gold);
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #ddd;
            font-weight: 400;
            line-height: 1.6;
        }

        p {
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(to right, #25D366, #128C7E);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);
            transition: all 0.3s ease;
        }

        .whatsapp-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.6);
        }

        .refresh-btn {
            background: transparent;
            color: var(--clr-light-blue);
            border: 1px solid var(--clr-light-blue);
            margin-top: 20px;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .refresh-btn:hover {
            background: rgba(0, 242, 254, 0.1);
        }
        
    </style>
</head>
<body>

    <div class="offline-container">
        <div class="profile-wrapper">
            <img src="assets/primary_image/profile.png" alt="عبد العزيز المحافيظ" class="profile-img">
        </div>
        
        <h1><i class="fas fa-wifi-slash"></i> عذراً، أنت غير متصل بالإنترنت!</h1>
        <h2>يبدو أنك فقدت الاتصال بالشبكة. لا يمكنك استعراض الملف الشخصي كاملاً في الوقت الحالي.</h2>
        
        <p>في حالة وجود أي استفسار عاجل، لا تتردد بالتواصل معي مباشرة عبر الواتساب:</p>
        
        <a href="https://wa.me/967776543245" class="whatsapp-btn" target="_blank">
            <i class="fab fa-whatsapp"></i> تواصل معي عبر الواتساب
        </a>
        <br>
        <button class="refresh-btn" onclick="window.location.reload();"><i class="fas fa-sync-alt"></i> حاول مجدداً</button>
    </div>

</body>
</html>
